    <h1>Enquiry</h1>
    <p>If you have a question about an order, custom orders, or wholesale, send us a message below.</p>

    <!-- Simple contact form (static prototype). To make this functional,
         replace action with a server endpoint or integrate with a service like Formspree. -->
    <form method="post" action="#">
      <label for="name">Full name</label><br>
      <input id="name" name="name" required><br><br>

      <label for="email">Email</label><br>
      <input id="email" type="email" name="email" required><br><br>

      <label for="message">Message</label><br>
      <textarea id="message" name="message" rows="6" required></textarea><br><br>

      <button type="submit">Send Enquiry</button>
    </form>

    <!-- Notes for maintainers:
         - For production, add CSRF protection and server-side validation.
         - Integrate with local South African SMS or email providers if needed.
    -->
